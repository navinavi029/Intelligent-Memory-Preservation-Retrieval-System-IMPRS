# Production Profile - Optimized for Performance and Reliability

# NVIDIA NIM API Configuration - Production Optimized
nvidia.api.key=${NVIDIA_API_KEY}
nvidia.api.base-url=https://integrate.api.nvidia.com/v1
nvidia.api.embedding-model=nvidia/llama-3.2-nemoretriever-300m-embed-v1
nvidia.api.chat-model=meta/llama-3.1-70b-instruct
nvidia.api.max-tokens=1024
nvidia.api.temperature=0.6
nvidia.api.top-p=0.85
nvidia.api.frequency-penalty=0.15
nvidia.api.presence-penalty=0.1

# Spring AI Configuration
spring.ai.openai.api-key=${NVIDIA_API_KEY}
spring.ai.openai.base-url=https://integrate.api.nvidia.com/v1
spring.ai.openai.chat.options.model=meta/llama-3.1-70b-instruct
spring.ai.openai.chat.options.max-tokens=1024
spring.ai.openai.chat.options.temperature=0.6
spring.ai.openai.chat.options.top-p=0.85
spring.ai.openai.chat.options.frequency-penalty=0.15
spring.ai.openai.chat.options.presence-penalty=0.1

# PostgreSQL Configuration - Production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration - Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Application Configuration - Production Optimized
app.chunking.chunk-size=800
app.chunking.overlap=100
app.retrieval.top-k=8
app.retrieval.similarity-threshold=0.25
app.retrieval.rerank-enabled=true
app.retrieval.diversity-threshold=0.7
app.response.max-context-length=4000
app.response.context-compression=true
app.response.citation-style=detailed
app.embedding.batch-size=50

# Resilience4j Configuration - Production
resilience4j.circuitbreaker.instances.nvidia-api.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.nvidia-api.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.nvidia-api.sliding-window-size=20
resilience4j.circuitbreaker.instances.nvidia-api.minimum-number-of-calls=10

resilience4j.retry.instances.nvidia-api.max-attempts=5
resilience4j.retry.instances.nvidia-api.wait-duration=3s
resilience4j.retry.instances.nvidia-api.enable-exponential-backoff=true
resilience4j.retry.instances.nvidia-api.exponential-backoff-multiplier=3.0
resilience4j.retry.instances.nvidia-api.randomized-wait-factor=0.3

resilience4j.ratelimiter.instances.nvidia-api.limit-for-period=20
resilience4j.ratelimiter.instances.nvidia-api.limit-refresh-period=1s
resilience4j.ratelimiter.instances.nvidia-api.timeout-duration=10s

# Logging - Production
logging.level.root=WARN
logging.level.com.example.demo=INFO
logging.level.org.springframework.ai=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator - Production Security
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.info.enabled=true
management.metrics.export.prometheus.enabled=true