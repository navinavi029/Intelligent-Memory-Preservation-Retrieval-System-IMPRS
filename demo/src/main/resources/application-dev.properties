# Development Profile - Optimized Settings

# NVIDIA NIM API Configuration - Development
nvidia.api.key=${NVIDIA_API_KEY}
nvidia.api.base-url=https://integrate.api.nvidia.com/v1
nvidia.api.embedding-model=nvidia/llama-3.2-nemoretriever-300m-embed-v1
nvidia.api.chat-model=nvidia/nemotron-3-super-120b-a12b
nvidia.api.max-tokens=1024
nvidia.api.temperature=0.7
nvidia.api.top-p=0.9
nvidia.api.frequency-penalty=0.1
nvidia.api.presence-penalty=0.1

# Spring AI Configuration
spring.ai.openai.api-key=${NVIDIA_API_KEY}
spring.ai.openai.base-url=https://integrate.api.nvidia.com/v1
spring.ai.openai.chat.options.model=nvidia/nemotron-3-super-120b-a12b
spring.ai.openai.chat.options.max-tokens=1024
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.frequency-penalty=0.1
spring.ai.openai.chat.options.presence-penalty=0.1
spring.ai.openai.embedding.options.model=nvidia/llama-3.2-nemoretriever-300m-embed-v1

# PostgreSQL Configuration - Development (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/ragdb?stringtype=unspecified
spring.datasource.username=raguser
spring.datasource.password=ragpass

# JPA Configuration - Auto-update schema in development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Application Configuration - Development Optimized
app.chunking.chunk-size=800
app.chunking.overlap=100
app.retrieval.top-k=8
app.retrieval.similarity-threshold=0.25
app.retrieval.rerank-enabled=true
app.retrieval.diversity-threshold=0.7
app.response.max-context-length=4000
app.response.context-compression=true
app.response.citation-style=detailed
app.embedding.batch-size=100
