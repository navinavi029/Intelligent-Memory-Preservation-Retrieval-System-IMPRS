spring.application.name=pdf-rag-chatbot

# Server Configuration
server.port=8080

# NVIDIA NIM API Configuration
nvidia.api.key=${NVIDIA_API_KEY:nvapi-YOUR_API_KEY_HERE}
nvidia.api.base-url=https://integrate.api.nvidia.com/v1
nvidia.api.embedding-model=nvidia/llama-3.2-nemoretriever-300m-embed-v1
nvidia.api.chat-model=meta/llama-3.1-8b-instruct
nvidia.api.max-tokens=500

# NVIDIA NIM API (for chat only - embeddings use custom client)
spring.ai.openai.api-key=${NVIDIA_API_KEY:nvapi-YOUR_API_KEY_HERE}
spring.ai.openai.base-url=https://integrate.api.nvidia.com/v1
spring.ai.openai.chat.options.model=meta/llama-3.1-8b-instruct
spring.ai.openai.chat.options.max-tokens=500

# Disable Google Gemini chat model autoconfiguration (we only use NVIDIA)
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/pdf_rag_db?stringtype=unspecified
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Configuration - Chunking
app.chunking.chunk-size=500
app.chunking.overlap=50

# Application Configuration - Retrieval
app.retrieval.top-k=5
app.retrieval.similarity-threshold=0.3

# Application Configuration - Embedding
app.embedding.batch-size=100

# Application Configuration - Retry
app.retry.max-attempts=3
app.retry.initial-delay=1000
app.retry.multiplier=2.0

# OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.ai=DEBUG
