spring.application.name=intelligent-memory-preservation-system

# Active Profile - Set to dev for development, prod for production
spring.profiles.active=dev

# Server Configuration
server.port=8080

# NVIDIA NIM API Configuration - Optimized for Speed
nvidia.api.key=${NVIDIA_API_KEY:nvapi-YOUR_API_KEY_HERE}
nvidia.api.base-url=https://integrate.api.nvidia.com/v1
nvidia.api.embedding-model=nvidia/nv-embed-v1
nvidia.api.chat-model=meta/llama-3.1-70b-instruct
nvidia.api.max-tokens=512
nvidia.api.temperature=0.7
nvidia.api.top-p=0.9
nvidia.api.frequency-penalty=0.2
nvidia.api.presence-penalty=0.2

# NVIDIA NIM API (for chat only - embeddings use custom client)
spring.ai.openai.api-key=${NVIDIA_API_KEY:nvapi-YOUR_API_KEY_HERE}
spring.ai.openai.base-url=https://integrate.api.nvidia.com/v1
spring.ai.openai.chat.options.model=nvidia/nemotron-3-super-120b-a12b
spring.ai.openai.chat.options.max-tokens=1024
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.frequency-penalty=0.1
spring.ai.openai.chat.options.presence-penalty=0.1

# Disable Google Gemini chat model autoconfiguration (we only use NVIDIA)
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration

# PostgreSQL Configuration (Docker) - Optimized for Performance
spring.datasource.url=jdbc:postgresql://localhost:5432/ragdb?stringtype=unspecified&prepareThreshold=0
spring.datasource.username=raguser
spring.datasource.password=ragpass
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration (Optimized)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration (now for text content limits)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Configuration - Diary Entries
app.entry.max-length=500

# Application Configuration - Chunking (Optimized)
app.chunking.chunk-size=800
app.chunking.overlap=100

# Application Configuration - Retrieval (Optimized for Speed)
app.retrieval.top-k=8
app.retrieval.similarity-threshold=0.25
app.retrieval.rerank-enabled=false
app.retrieval.diversity-threshold=0.85

# Application Configuration - Response Quality
app.response.max-context-length=4000
app.response.context-compression=true
app.response.citation-style=detailed

# Application Configuration - Embedding
app.embedding.batch-size=100

# Application Configuration - Retry
app.retry.max-attempts=3
app.retry.initial-delay=1000
app.retry.multiplier=2.0

# OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.ai=DEBUG

# Resilience4j Circuit Breaker Configuration (Optimized for Speed)
resilience4j.circuitbreaker.instances.nvidia-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.nvidia-api.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.nvidia-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.nvidia-api.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.nvidia-api.permitted-number-of-calls-in-half-open-state=3

# Resilience4j Retry Configuration (Optimized for Speed)
resilience4j.retry.instances.nvidia-api.max-attempts=2
resilience4j.retry.instances.nvidia-api.wait-duration=1s
resilience4j.retry.instances.nvidia-api.enable-exponential-backoff=true
resilience4j.retry.instances.nvidia-api.exponential-backoff-multiplier=2
resilience4j.retry.instances.nvidia-api.randomized-wait-factor=0.1

# Resilience4j Rate Limiter Configuration (Optimized for Speed)
resilience4j.ratelimiter.instances.nvidia-api.limit-for-period=20
resilience4j.ratelimiter.instances.nvidia-api.limit-refresh-period=1s
resilience4j.ratelimiter.instances.nvidia-api.timeout-duration=5s

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
